# Maps raw journal work to the curated book structure.
# Keep this file small enough to edit every time a day or experiment is added.

canonical_repo:
  journal_home: days/
  runpod_experiments: experiments/runpod/
  results: results/
  concept_notes: notes/
  book: book/
  prompts: prompts/
  prior_source: source-material/prior-inference-journal/

current_days:
  - id: day-01
    path: days/Day01.md
    status: raw
    book_targets:
      - book/index.qmd
      - book/chapters/00-source-journal-runpod-lab-path.qmd
      - book/chapters/01-executive-map.qmd
      - book/chapters/20-vllm-from-first-principles.qmd
      - book/chapters/21-runpodai-practical-deployment.qmd
    durable_points:
      - repo structure
      - write/run/measure/promote workflow
      - first Runpod vLLM smoke-test direction

